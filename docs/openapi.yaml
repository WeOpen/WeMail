{
  "openapi": "3.1.0",
  "info": {
    "title": "WeMail 菜单化后端 API",
    "version": "0.1.4",
    "description": "WeMail 后端 API 已按管理后台左侧菜单分组。旧 /auth、/admin、/api/mailboxes、/api/messages、/api/outbound、/api/keys、/api/telegram 路径不再保留。"
  },
  "servers": [
    {
      "url": "/",
      "description": "当前 Worker 服务根路径"
    }
  ],
  "tags": [
    {
      "name": "认证",
      "description": "注册、登录、退出和当前会话。"
    },
    {
      "name": "仪表盘",
      "description": "工作台总览数据。"
    },
    {
      "name": "API 密钥",
      "description": "个人 API Key 管理。"
    },
    {
      "name": "Webhook",
      "description": "事件端点和投递日志。"
    },
    {
      "name": "Telegram",
      "description": "Telegram 订阅。"
    },
    {
      "name": "公告",
      "description": "公告列表与发布。"
    },
    {
      "name": "个人资料",
      "description": "个人资料、偏好和会话设备。"
    },
    {
      "name": "系统设置",
      "description": "健康检查和功能开关。"
    },
    {
      "name": "账号",
      "description": "邮箱账号列表、创建、删除和账号策略。"
    },
    {
      "name": "邮件",
      "description": "收件、附件、发件、邮件设置。"
    },
    {
      "name": "用户",
      "description": "用户、邀请码、账号监管和外发配额。"
    }
  ],
  "paths": {
    "/api/auth/register": {
      "post": {
        "tags": [
          "认证"
        ],
        "summary": "使用邀请码注册账号",
        "operationId": "registerUser",
        "requestBody": {
          "$ref": "#/components/requestBodies/RegisterRequest"
        },
        "responses": {
          "201": {
            "$ref": "#/components/responses/SessionResponse"
          }
        }
      }
    },
    "/api/auth/login": {
      "post": {
        "tags": [
          "认证"
        ],
        "summary": "登录账号",
        "operationId": "loginUser",
        "requestBody": {
          "$ref": "#/components/requestBodies/LoginRequest"
        },
        "responses": {
          "200": {
            "$ref": "#/components/responses/SessionResponse"
          }
        }
      }
    },
    "/api/auth/logout": {
      "post": {
        "tags": [
          "认证"
        ],
        "summary": "退出登录",
        "operationId": "logoutUser",
        "responses": {
          "200": {
            "$ref": "#/components/responses/Ok"
          }
        }
      }
    },
    "/api/auth/oauth/{provider}/start": {
      "get": {
        "tags": [
          "认证"
        ],
        "summary": "发起第三方快捷登录",
        "operationId": "startOAuthLogin",
        "parameters": [
          {
            "name": "provider",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "enum": [
                "github",
                "linuxdo"
              ]
            }
          },
          {
            "name": "next",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "302": {
            "description": "Redirect to OAuth provider"
          },
          "503": {
            "$ref": "#/components/responses/Error"
          }
        }
      }
    },
    "/api/auth/oauth/{provider}/callback": {
      "get": {
        "tags": [
          "认证"
        ],
        "summary": "处理第三方登录回调",
        "operationId": "handleOAuthCallback",
        "parameters": [
          {
            "name": "provider",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "enum": [
                "github",
                "linuxdo"
              ]
            }
          },
          {
            "name": "code",
            "in": "query",
            "required": true,
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "state",
            "in": "query",
            "required": true,
            "schema": {
              "type": "string"
            }
          }
        ],
        "responses": {
          "302": {
            "description": "Redirect to app or invite finalization"
          },
          "400": {
            "$ref": "#/components/responses/Error"
          }
        }
      }
    },
    "/api/auth/oauth/{provider}/finalize": {
      "post": {
        "tags": [
          "认证"
        ],
        "summary": "使用邀请码完成第三方新用户登录",
        "operationId": "finalizeOAuthLogin",
        "parameters": [
          {
            "name": "provider",
            "in": "path",
            "required": true,
            "schema": {
              "type": "string",
              "enum": [
                "github",
                "linuxdo"
              ]
            }
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "ticket",
                  "inviteCode"
                ],
                "properties": {
                  "ticket": {
                    "type": "string"
                  },
                  "inviteCode": {
                    "type": "string"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "$ref": "#/components/responses/SessionResponse"
          },
          "403": {
            "$ref": "#/components/responses/Error"
          }
        }
      }
    },
    "/api/auth/session": {
      "get": {
        "tags": [
          "认证"
        ],
        "summary": "获取当前登录态",
        "operationId": "getCurrentSession",
        "security": [
          {
            "cookieAuth": []
          },
          {
            "bearerAuth": []
          }
