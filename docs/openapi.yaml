          "403": {
            "$ref": "#/components/responses/Error"
          }
        }
      }
    },
    "/api/api-keys/{id}": {
      "delete": {
        "tags": [
          "API 密钥"
        ],
        "summary": "吊销 API Key",
        "operationId": "revokeApiKey",
        "security": [
          {
            "cookieAuth": []
