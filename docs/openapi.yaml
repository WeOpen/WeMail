    "/api/mail/messages": {
      "get": {
        "tags": [
          "邮件"
        ],
        "summary": "获取账号消息列表",
        "description": "普通用户留空 accountId 时返回本人账号邮件；管理员留空时返回所有启用账号邮件，并包含未匹配到系统账号的入站邮件。",
        "operationId": "listMailMessages",
