        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object"
              },
              "example": {
                "label": "个人 CLI",
                "scopes": [
                  "mail:read",
                  "mail:send"
                ]
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "创建成功"
