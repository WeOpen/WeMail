    "title": "WeMail 菜单化后端 API",
    "version": "2.0.0",
    "description": "WeMail 后端 API 已按管理后台左侧菜单分组。旧 /auth、/admin、/api/mailboxes、/api/messages、/api/outbound、/api/keys、/api/telegram 路径不再保留。"
  },
  "servers": [
    {
      "url": "/",
      "description": "当前 Worker 服务根路径"
    }
  ],
