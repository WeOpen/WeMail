    "/api/announcements": {
      "get": {
        "tags": [
          "公告"
        ],
        "summary": "获取公告列表",
        "operationId": "listAnnouncements",
        "security": [
          {
            "cookieAuth": []
          },
          {
            "bearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "page",
            "in": "query",
            "schema": {
              "type": "integer",
              "minimum": 1
            }
          },
          {
            "name": "pageSize",
            "in": "query",
            "schema": {
              "type": "integer",
              "enum": [
                3,
                4,
                5,
                10,
                20,
                50
              ]
            }
          },
          {
            "name": "q",
            "in": "query",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "type",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "产品更新",
                "维护通知",
                "运营通知",
                "安全提醒"
              ]
            }
          },
          {
            "name": "status",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "已发布",
                "进行中",
                "即将开始",
                "已结束",
                "已归档"
              ]
            }
          },
          {
            "name": "time",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "7d",
                "30d"
              ]
            }
          },
          {
            "name": "scope",
            "in": "query",
            "schema": {
              "type": "string",
              "enum": [
                "manage"
              ]
            }
          }
        ],
        "responses": {
          "200": {
            "description": "公告列表"
          }
        }
      },
