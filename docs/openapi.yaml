          {
            "cookieAuth": []
          },
          {
            "bearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "accountId",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "邮箱账号 ID，留空时普通用户返回本人账号邮件，管理员返回全局启用账号邮件和未匹配邮件。"
          },
          {
            "name": "mailboxId",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "accountId 的兼容别名。"
          },
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "minimum": 1,
              "default": 1
            }
          },
          {
            "name": "pageSize",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "minimum": 1,
              "maximum": 100,
              "default": 10
            }
          },
          {
            "name": "search",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "按收件人、发件人、主题、正文预览或提取值搜索。"
          },
          {
            "name": "filter",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "all",
                "code",
                "link",
                "attachment",
                "unparsed"
              ],
              "default": "all"
            }
          },
          {
            "name": "from",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "按发件人模糊筛选。"
          },
          {
            "name": "subject",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "按主题模糊筛选。"
          },
          {
            "name": "startDate",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "format": "date-time"
            },
            "description": "按接收时间下限筛选。"
          },
          {
            "name": "endDate",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "format": "date-time"
            },
            "description": "按接收时间上限筛选。"
          },
          {
            "name": "hasAttachment",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean"
            },
            "description": "是否只显示有/无附件邮件。"
          },
          {
            "name": "extractionType",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "auth_code",
                "auth_link",
                "service_link",
                "subscription_link",
                "other_link",
                "none"
              ]
            },
            "description": "按识别结果类型筛选。"
          }
        ],
        "responses": {
          "200": {
            "description": "分页消息列表，包含 messages、total、page、pageSize 与 summary；message 可包含 toAddress。"
          },
          "404": {
            "$ref": "#/components/responses/Error"
          }
        }
      }
    },
