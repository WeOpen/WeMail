    "/api/accounts": {
      "get": {
        "tags": [
          "账号"
        ],
        "summary": "获取当前用户账号列表",
        "description": "不传分页参数时返回当前用户全部账号；传入 page、pageSize 或 search 时返回分页结果，供邮箱选择弹窗使用。管理员分页查询返回所有用户的启用账号，并带创建人字段。",
        "operationId": "listAccounts",
        "security": [
          {
            "cookieAuth": []
          },
          {
            "bearerAuth": []
          }
        ],
        "parameters": [
          {
            "name": "page",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "minimum": 1
            },
            "description": "分页页码；传入后响应包含 total、page、pageSize。"
          },
          {
            "name": "pageSize",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "minimum": 1,
              "maximum": 50
            },
            "description": "每页账号数，默认 10，最大 50。"
          },
          {
            "name": "search",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "按账号标签或邮箱地址搜索。"
          }
        ],
        "responses": {
          "200": {
            "description": "账号列表；分页查询时额外返回 total、page、pageSize。",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "required": [
                    "mailboxes"
                  ],
                  "properties": {
                    "mailboxes": {
                      "type": "array",
                      "items": {
                        "type": "object",
                        "required": [
                          "id",
                          "address",
                          "label",
                          "createdAt"
                        ],
                        "properties": {
                          "id": {
                            "type": "string"
                          },
                          "address": {
                            "type": "string",
                            "format": "email"
                          },
                          "label": {
                            "type": "string"
                          },
                          "createdBy": {
                            "type": [
                              "string",
                              "null"
                            ],
                            "description": "仅管理员分页查询返回。"
                          },
                          "createdByName": {
                            "type": [
                              "string",
                              "null"
                            ],
                            "description": "仅管理员分页查询返回。"
                          },
                          "createdAt": {
                            "type": "string",
                            "format": "date-time"
                          }
                        }
                      }
                    },
                    "total": {
                      "type": "integer",
                      "minimum": 0
                    },
                    "page": {
                      "type": "integer",
                      "minimum": 1
                    },
                    "pageSize": {
                      "type": "integer",
                      "minimum": 1
                    }
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Error"
          }
        }
      },
