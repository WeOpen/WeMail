name = "wemail"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Local defaults used by `wrangler dev`.
# Business defaults such as domains, quotas, attachment limits, and feature
# toggles are stored in D1 system_settings and edited from the admin UI. When
# those D1 settings are empty, code-level defaults from @wemail/shared apply.
[vars]
ENVIRONMENT = "local"
APP_NAME = "WeMail"
COOKIE_NAME = "wemail_session"
COOKIE_SECURE = "false"
CORS_ALLOWED_ORIGINS = "http://localhost:5173,http://127.0.0.1:5173"

[[d1_databases]]
binding = "DB"
database_name = "wemail"
database_id = "local"
migrations_dir = "src/infrastructure/db/migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "local-cache"
preview_id = "local-cache-preview"

# Remote deployments should use explicit environments so staging and
# production can point at different D1 instances, origins, and secrets.
# Keep D1 and KV IDs as placeholders in this open-source file; GitHub Actions
# injects the real environment-specific IDs from GitHub Environment secrets.
[env.staging]
workers_dev = true
routes = [
  { pattern = "staging.wemail.willxue.com/api/*", zone_name = "willxue.com" }
]

[env.staging.vars]
ENVIRONMENT = "staging"
APP_NAME = "WeMail"
COOKIE_NAME = "wemail_session"
COOKIE_SECURE = "true"
CORS_ALLOWED_ORIGINS = "https://staging.wemail.willxue.com"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "wemail-staging"
database_id = "replace-with-staging-d1-id"
migrations_dir = "src/infrastructure/db/migrations"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id = "replace-with-staging-kv-id"
preview_id = "replace-with-staging-kv-preview-id"

[[env.staging.r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "wemail-staging-attachments"

[env.production]
workers_dev = true
routes = [
  { pattern = "wemail.willxue.com/api/*", zone_name = "willxue.com" },
  { pattern = "wemail-api.willxue.com/api/*", zone_name = "willxue.com" }
]

[env.production.vars]
ENVIRONMENT = "production"
APP_NAME = "WeMail"
COOKIE_NAME = "wemail_session"
COOKIE_DOMAIN = ".willxue.com"
COOKIE_SECURE = "true"
CORS_ALLOWED_ORIGINS = "https://wemail.willxue.com"
TELEGRAM_BOT_USERNAME = "WeMailProBot"

[[env.production.d1_databases]]
binding = "DB"
database_name = "wemail-production"
database_id = "replace-with-production-d1-id"
migrations_dir = "src/infrastructure/db/migrations"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "replace-with-production-kv-id"
preview_id = "replace-with-production-kv-preview-id"

[[env.production.r2_buckets]]
binding = "ATTACHMENTS"
bucket_name = "wemail-production-attachments"
