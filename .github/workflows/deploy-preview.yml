name: Preview Build

on:
  pull_request:

permissions:
  contents: read
  deployments: write

jobs:
  preview-bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.18.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build

      - name: Upload preview bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: web-preview-bundle
          path: apps/web/dist
          retention-days: 7

      - name: Detect Cloudflare preview config
        id: preview_config
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          if [[ -n "$CF_API_TOKEN" && -n "$CF_ACCOUNT_ID" && -n "$CF_PAGES_PROJECT" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Pages preview via Wrangler
        if: ${{ steps.preview_config.outputs.enabled == 'true' }}
        id: deploy_preview
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: >-
            pages deploy apps/web/dist
            --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
            --branch=pr-${{ github.event.pull_request.number }}

      - name: Write preview summary
        if: ${{ steps.deploy_preview.outcome == 'success' }}
        run: |
          echo "## Cloudflare Preview" >> $GITHUB_STEP_SUMMARY
          echo "Deployment URL: ${{ steps.deploy_preview.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
          echo "Alias URL: ${{ steps.deploy_preview.outputs.pages-deployment-alias-url }}" >> $GITHUB_STEP_SUMMARY

      - name: Preview skipped summary
        if: ${{ steps.preview_config.outputs.enabled != 'true' }}
        run: |
          echo "## Cloudflare Preview" >> $GITHUB_STEP_SUMMARY
          echo "Preview deployment skipped because required Cloudflare secrets are not configured." >> $GITHUB_STEP_SUMMARY
