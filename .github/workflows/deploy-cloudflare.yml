name: Deploy Cloudflare

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-cloudflare-${{ github.event.inputs.environment }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    outputs:
      worker_command: ${{ steps.target.outputs.worker_command }}
      worker_environment: ${{ steps.target.outputs.worker_environment }}
      pages_branch: ${{ steps.target.outputs.pages_branch }}
      pages_mode: ${{ steps.target.outputs.pages_mode }}
    steps:
      - name: Guard production branch
        if: ${{ github.event.inputs.environment == 'production' }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Production deployments are only allowed from the main branch." >&2
            echo "Current ref: ${GITHUB_REF}" >&2
            exit 1
          fi

      - name: Validate required Cloudflare secrets
        shell: bash
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          CF_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          CF_KV_PREVIEW_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID }}
          WEB_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          missing=()
          [[ -z "$CF_API_TOKEN" ]] && missing+=("CLOUDFLARE_API_TOKEN")
          [[ -z "$CF_ACCOUNT_ID" ]] && missing+=("CLOUDFLARE_ACCOUNT_ID")
          [[ -z "$CF_PAGES_PROJECT" ]] && missing+=("CLOUDFLARE_PAGES_PROJECT_NAME")
          [[ -z "$CF_D1_DATABASE_ID" ]] && missing+=("CLOUDFLARE_D1_DATABASE_ID")
          [[ -z "$CF_KV_NAMESPACE_ID" ]] && missing+=("CLOUDFLARE_KV_NAMESPACE_ID")
          [[ -z "$CF_KV_PREVIEW_NAMESPACE_ID" ]] && missing+=("CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID")
          [[ -z "$WEB_API_BASE_URL" ]] && missing+=("VITE_API_BASE_URL")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required secrets or variables for %s: %s\n' "${{ github.event.inputs.environment }}" "${missing[*]}" >&2
            printf 'Set VITE_API_BASE_URL as a GitHub Environment variable or secret. Prefer a same-site Worker API custom domain such as https://wemail-api.example.com, without a trailing /api.\n' >&2
            exit 1
          fi

      - name: Resolve deployment targets
        id: target
        shell: bash
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "staging" ]]; then
            echo "d1_database_name=wemail-staging" >> "$GITHUB_OUTPUT"
            echo "worker_command=deploy --env staging" >> "$GITHUB_OUTPUT"
            echo "worker_environment=staging" >> "$GITHUB_OUTPUT"
            echo "pages_branch=staging" >> "$GITHUB_OUTPUT"
            echo "pages_mode=preview" >> "$GITHUB_OUTPUT"
          else
            echo "d1_database_name=wemail-production" >> "$GITHUB_OUTPUT"
            echo "worker_command=deploy --env production" >> "$GITHUB_OUTPUT"
            echo "worker_environment=production" >> "$GITHUB_OUTPUT"
            echo "pages_branch=" >> "$GITHUB_OUTPUT"
            echo "pages_mode=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish plan summary
        shell: bash
        run: |
          echo "## Cloudflare Deploy Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${{ github.event.inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Git ref: ${GITHUB_REF}" >> "$GITHUB_STEP_SUMMARY"
          echo "- D1 database: ${{ steps.target.outputs.d1_database_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Worker command: ${{ steps.target.outputs.worker_command }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pages mode: ${{ steps.target.outputs.pages_mode }}" >> "$GITHUB_STEP_SUMMARY"

  verify:
    needs: prepare
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.18.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Version check
        run: pnpm version:check

      - name: Verify
        run: |
          pnpm test
          pnpm typecheck
          pnpm lint

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          pnpm build

      - name: Upload web bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: web-dist-${{ github.event.inputs.environment }}
          path: apps/web/dist
          if-no-files-found: error
          retention-days: 7

  deploy-worker:
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.18.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Inject private Worker bindings
        shell: bash
        working-directory: apps/worker
        env:
          TARGET_ENV: ${{ needs.prepare.outputs.worker_environment }}
          D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
          KV_PREVIEW_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID }}
        run: |
          missing=()
          [[ -z "$D1_DATABASE_ID" ]] && missing+=("CLOUDFLARE_D1_DATABASE_ID")
          [[ -z "$KV_NAMESPACE_ID" ]] && missing+=("CLOUDFLARE_KV_NAMESPACE_ID")
          [[ -z "$KV_PREVIEW_NAMESPACE_ID" ]] && missing+=("CLOUDFLARE_KV_PREVIEW_NAMESPACE_ID")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing Worker binding secrets for %s: %s\n' "$TARGET_ENV" "${missing[*]}" >&2
            exit 1
          fi

          case "$TARGET_ENV" in
            staging)
              D1_PLACEHOLDER="replace-with-staging-d1-id"
              KV_PLACEHOLDER="replace-with-staging-kv-id"
              KV_PREVIEW_PLACEHOLDER="replace-with-staging-kv-preview-id"
              ;;
            production)
              D1_PLACEHOLDER="replace-with-production-d1-id"
              KV_PLACEHOLDER="replace-with-production-kv-id"
              KV_PREVIEW_PLACEHOLDER="replace-with-production-kv-preview-id"
              ;;
            *)
              printf 'Unsupported Worker environment: %s\n' "$TARGET_ENV" >&2
              exit 1
              ;;
          esac

          export D1_PLACEHOLDER KV_PLACEHOLDER KV_PREVIEW_PLACEHOLDER
          perl -0pi -e 's/\Q$ENV{D1_PLACEHOLDER}\E/$ENV{D1_DATABASE_ID}/g; s/\Q$ENV{KV_PLACEHOLDER}\E/$ENV{KV_NAMESPACE_ID}/g; s/\Q$ENV{KV_PREVIEW_PLACEHOLDER}\E/$ENV{KV_PREVIEW_NAMESPACE_ID}/g' wrangler.toml

          if grep -qF "$D1_PLACEHOLDER" wrangler.toml || grep -qF "$KV_PLACEHOLDER" wrangler.toml || grep -qF "$KV_PREVIEW_PLACEHOLDER" wrangler.toml; then
            echo "Failed to inject Worker binding secrets into wrangler.toml." >&2
            exit 1
          fi

      - name: Apply D1 migrations
        shell: bash
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TARGET_ENV: ${{ needs.prepare.outputs.worker_environment }}
        run: pnpm exec wrangler d1 migrations apply DB --env "$TARGET_ENV" --remote

      - name: Deploy Worker with Wrangler
        shell: bash
        working-directory: apps/worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TARGET_ENV: ${{ needs.prepare.outputs.worker_environment }}
        run: pnpm exec wrangler deploy --env "$TARGET_ENV"

      - name: Worker deploy summary
        shell: bash
        run: |
          echo "## Worker Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: ${{ needs.prepare.outputs.worker_environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- D1 migrations: applied through binding DB" >> "$GITHUB_STEP_SUMMARY"

  deploy-pages:
    needs: [prepare, verify]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download web bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: web-dist-${{ github.event.inputs.environment }}
          path: apps/web/dist

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 10.18.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Deploy Pages staging preview via Wrangler
        if: ${{ needs.prepare.outputs.pages_branch != '' }}
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          PAGES_BRANCH: ${{ needs.prepare.outputs.pages_branch }}
        run: >-
          pnpm exec wrangler pages deploy apps/web/dist
          --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME"
          --branch="$PAGES_BRANCH"

      - name: Deploy Pages production via Wrangler
        if: ${{ needs.prepare.outputs.pages_branch == '' }}
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: >-
          pnpm exec wrangler pages deploy apps/web/dist
          --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME"

      - name: Publish Pages summary
        shell: bash
        run: |
          echo "## Pages Deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "- Mode: ${{ needs.prepare.outputs.pages_mode }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bundle: apps/web/dist" >> "$GITHUB_STEP_SUMMARY"
